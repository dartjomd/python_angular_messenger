<div class="chat-container">
  <div class="messages-area">
    
    @for (msg of chatService.messageList(); track msg.chat_id) {
      <div class="message-row" 
           [class.outgoing]="msg.sender_id === currentUserId" 
           [class.incoming]="msg.sender_id !== currentUserId">
        <div class="message-bubble">
          <p class="message-text">{{ msg.text }}</p>
          <span class="message-time">18:15</span>
        </div>
      </div>
    } @empty {
      <div class="no-messages">
        <p>Здесь пока нет сообщений... Напишите что-нибудь первым!</p>
      </div>
    }

  </div>

  <div class="chat-footer">
    <button class="btn-icon attach-btn" title="Прикрепить файл">
      <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-3.31 2.69-6 6-6s6 2.69 6 6v10c0 4.42-3.58 8-8 8s-8-3.58-8-8V6h2v9c0 3.31 2.69 6 6 6s6-2.69 6-6V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 1.1.9 2 2 2s2-.9 2-2V6h2z"/></svg>
    </button>
    
    <div class="input-wrapper">
      <input 
        type="text" 
        placeholder="Напишите сообщение..." 
        class="message-input" 
        [ngModel]="textInput()"
        (ngModelChange)="textInput.set($event)"
        (keydown.enter)="send()"
      />
    </div>

    <button class="btn-send" title="Отправить" (click)="send()">
      <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
