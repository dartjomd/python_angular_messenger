<header class="main-header">
  <div class="content">
    @if (headerService.chatState(); as chat) {
    <div class="header-chat-mode">
      <button class="btn-back" (click)="goBack()" title="Назад">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
        </svg>
      </button>

      <div class="chat-user-info">
        <app-avatar [avatarText]="chat.avatarLetter" [isOnline]="chat.isOnline" [isGroup]="chat.isGroup">
        </app-avatar>

        <div class="user-meta">
          <span class="chat-username">{{ chat.username }}</span>

          <span class="chat-status" [class.online]="chat.isOnline">
            @if (chat.isGroup) {
            группа
            } @else {
            @if (chat.isOnline) {
            в сети
            } @else {
            {{ chat.lastSeen ? 'был(а) в ' + chat.lastSeen : 'офлайн' }}
            }
            }
          </span>
        </div>
      </div>
    </div>
    } @else {
    <div class="logo" routerLink="/chats">
      <span class="logo-text">MAX</span>
    </div>

    <nav class="nav-links">
      <a routerLink="/search-users" routerLinkActive="active" class="nav-btn" title="Поиск"><svg
          xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg></a>
      <a routerLink="/chats" routerLinkActive="active" class="nav-btn" title="Чаты"><svg
          xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg></a>
      <a routerLink="/profile" routerLinkActive="active" class="nav-btn" title="Профиль">
        <app-avatar [avatarText]="user()?.avatar_letter || '?'" [isOnline]="true" [isGroup]="false">
        </app-avatar>
      </a>
    </nav>
    }
  </div>
</header>
